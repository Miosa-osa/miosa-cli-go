project_name: miosa

before:
  hooks:
    - go mod tidy

builds:
  - id: miosa
    main: ./cmd/miosa
    binary: miosa
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X 'github.com/Miosa-osa/miosa-cli-go/commands.cliVersion={{.Version}}'

archives:
  - id: miosa
    builds:
      - miosa
    name_template: "miosa_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

brews:
  - name: miosa
    repository:
      owner: Miosa-osa
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: miosa-releasebot
      email: releases@miosa.ai
    homepage: "https://miosa.ai"
    description: "Official CLI for MIOSA sandboxes"
    license: "MIT"
    install: |
      bin.install "miosa"
    test: |
      system "#{bin}/miosa", "version"
